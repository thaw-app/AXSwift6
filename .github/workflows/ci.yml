name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "Package.swift"
      - "Sources/**"
      - "Examples/**"
      - "Tests/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "Package.swift"
      - "Sources/**"
      - "Examples/**"
      - "Tests/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.6.app/Contents/Developer

      - name: Cache SwiftPM
        uses: actions/cache@v6.1.0
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build and test
        run: swift test
